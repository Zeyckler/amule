<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="uB" x1="0.1" y1="0" x2="0.75" y2="1">
      <stop offset="0" stop-color="#5fca72"/>
      <stop offset="0.55" stop-color="#37b048"/>
      <stop offset="1" stop-color="#1c8a3d"/>
    </linearGradient>
    <radialGradient id="uH" cx="0.62" cy="0.6" r="0.82">
      <stop offset="0" stop-color="#aeeab8"/>
      <stop offset="0.5" stop-color="#41b44f"/>
      <stop offset="1" stop-color="#1a8038"/>
    </radialGradient>
  </defs>
  <!-- chunky body: rounded right shoulder/back + left arm, matching the original silhouette -->
  <path d="M6.0 1.0
           C7.4 0.5 9.0 0.7 10.3 1.6 C11.1 2.2 11.2 3.2 11.0 4.0
           C12.4 3.9 13.6 4.3 14.2 5.5 C14.8 6.6 14.6 8.7 14.2 10.3
           C13.9 11.7 13.2 12.7 12.6 13.9 C12.2 14.6 12.0 15.1 11.8 15.6
           L1.5 15.6
           C1.1 13.4 1.1 10.5 1.7 8.6 C2.1 7.4 3.1 6.7 4.1 6.3
           C4.0 4.7 4.2 3.0 4.7 2.2 C5.0 1.5 5.4 1.1 6.0 1.0 Z"
        fill="url(#uB)" stroke="#11531e" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- head, sitting on the shoulders; lit on the SE side (looking down-right) -->
  <ellipse cx="7.4" cy="2.7" rx="3.4" ry="2.9" fill="url(#uH)" stroke="#11531e" stroke-width="0.5"/>
  <ellipse cx="8.6" cy="3.4" rx="1.3" ry="1.4" fill="#c9f2d0" opacity="0.5"/>
  <!-- crease separating the near (left) arm from the torso -->
  <path d="M4.4 8.5 C4.1 10.7 4.2 13.3 4.9 15.4" fill="none" stroke="#0f4a1c" stroke-width="0.55" opacity="0.75"/>
  <!-- torso gloss -->
  <rect x="7.2" y="8.4" width="1.5" height="6.6" rx="0.75" fill="#ffffff" opacity="0.3"/>
</svg>
