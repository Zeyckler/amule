<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#53c467"/>
      <stop offset="0.55" stop-color="#39b54a"/>
      <stop offset="1" stop-color="#008f3e"/>
    </linearGradient>
    <radialGradient id="head" cx="0.38" cy="0.28" r="0.9">
      <stop offset="0" stop-color="#93e0a1"/>
      <stop offset="0.55" stop-color="#39b54a"/>
      <stop offset="1" stop-color="#007236"/>
    </radialGradient>
  </defs>
  <!-- second user peeking out behind-right -->
  <circle cx="10.1" cy="4.6" r="2.8" fill="#1d8c3e" stroke="#1c361f" stroke-width="0.5"/>
  <path d="M4.6 15.6 v-4.1 a5.1 4.3 0 0 1 10.2 0 v4.1 Z" fill="#1d8c3e" stroke="#1c361f" stroke-width="0.5"/>
  <!-- front user -->
  <circle cx="7" cy="3.5" r="3.1" fill="url(#head)" stroke="#1c361f" stroke-width="0.6"/>
  <path d="M1.6 15.6 v-4.3 a5.5 4.6 0 0 1 11 0 v4.3 Z" fill="url(#body)" stroke="#1c361f" stroke-width="0.6"/>
  <!-- arm separation -->
  <path d="M4.4 10.9 V15.4" fill="none" stroke="#16552a" stroke-width="0.8"/>
  <!-- gloss -->
  <ellipse cx="6" cy="2.3" rx="1.2" ry="0.85" fill="#ffffff" opacity="0.75"/>
  <rect x="6.3" y="9.7" width="1.3" height="5.1" rx="0.6" fill="#ffffff" opacity="0.45"/>
</svg>
