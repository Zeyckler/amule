<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="uB" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#5fca72"/>
      <stop offset="0.55" stop-color="#37b048"/>
      <stop offset="1" stop-color="#1d8c3e"/>
    </linearGradient>
    <radialGradient id="uH" cx="0.6" cy="0.58" r="0.78">
      <stop offset="0" stop-color="#a6e8b0"/>
      <stop offset="0.55" stop-color="#3fb24d"/>
      <stop offset="1" stop-color="#1a8038"/>
    </radialGradient>
  </defs>
  <!-- torso / back, turned: right shoulder rounded and higher -->
  <path d="M4.7 15.6 C4.0 11.8 4.9 9.3 7.1 8.7 C9.5 8.0 12.1 8.6 13.2 10.5 C13.9 11.7 13.9 13.7 13.7 15.6 Z"
        fill="url(#uB)" stroke="#12551f" stroke-width="0.6" stroke-linejoin="round"/>
  <!-- left arm, bent and hanging -->
  <path d="M4.8 15.6 C2.6 14.2 2.2 11.4 3.7 10.1 C4.4 9.5 5.3 9.9 5.4 10.8 C4.8 12.1 4.8 13.9 5.7 15.6 Z"
        fill="url(#uB)" stroke="#12551f" stroke-width="0.6" stroke-linejoin="round"/>
  <!-- crease separating the near arm from the torso -->
  <path d="M5.2 11.0 C5.0 12.5 5.1 14.1 5.7 15.4" fill="none" stroke="#0f4a1c" stroke-width="0.5" opacity="0.7"/>
  <!-- head, turned to look down-right (SE) -->
  <ellipse cx="7.7" cy="4.1" rx="3.5" ry="3.6" fill="url(#uH)" stroke="#12551f" stroke-width="0.6"/>
  <!-- face light on the SE side, plus torso gloss -->
  <ellipse cx="8.8" cy="4.9" rx="1.4" ry="1.6" fill="#c9f2d0" opacity="0.5"/>
  <rect x="8.4" y="10.5" width="1.3" height="4.9" rx="0.6" fill="#ffffff" opacity="0.32"/>
</svg>
